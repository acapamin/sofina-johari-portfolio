<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Money Journey Roadmap — Capy's Quest</title>
<style>
  @font-face { font-family:'Fraunces'; font-style:normal; font-weight:300; font-display:block; src:url('../fonts/Fraunces-300.ttf') format('truetype'); }
  @font-face { font-family:'Fraunces'; font-style:normal; font-weight:400; font-display:block; src:url('../fonts/Fraunces-400.ttf') format('truetype'); }
  @font-face { font-family:'Fraunces'; font-style:normal; font-weight:450; font-display:block; src:url('../fonts/Fraunces-450.ttf') format('truetype'); }
  @font-face { font-family:'Fraunces'; font-style:normal; font-weight:500; font-display:block; src:url('../fonts/Fraunces-500.ttf') format('truetype'); }
  @font-face { font-family:'Fraunces'; font-style:italic; font-weight:400; font-display:block; src:url('../fonts/Fraunces-Italic-400.ttf') format('truetype'); }
  @font-face { font-family:'Fraunces'; font-style:italic; font-weight:450; font-display:block; src:url('../fonts/Fraunces-Italic-450.ttf') format('truetype'); }
  @font-face { font-family:'Instrument Sans'; font-style:normal; font-weight:400; font-display:block; src:url('../fonts/InstrumentSans-400.ttf') format('truetype'); }
  @font-face { font-family:'Instrument Sans'; font-style:normal; font-weight:600; font-display:block; src:url('../fonts/InstrumentSans-600.ttf') format('truetype'); }
  @font-face { font-family:'Instrument Sans'; font-style:normal; font-weight:700; font-display:block; src:url('../fonts/InstrumentSans-700.ttf') format('truetype'); }
  @font-face { font-family:'Instrument Sans'; font-style:italic; font-weight:400; font-display:block; src:url('../fonts/InstrumentSans-Italic-400.ttf') format('truetype'); }

  @page { size: 210mm 297mm; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --ink: #0b1f1a;
    --ink2: #11302a;
    --cream: #f6f1e7;
    --cream-deep: #ede5d4;
    --gold: #c9a14a;
    --gold-soft: #e0c98c;
    --gold-deep: #9a7427;
    --text: #1c2a26;
    --muted: #5b6b65;
    --green-bar: #5cb87a;
    --red-bar: #d96a4a;
    --serif: "Fraunces", Georgia, serif;
    --sans: "Instrument Sans", sans-serif;
  }
  body {
    font-family: var(--sans);
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    color: var(--text);
  }
  .page {
    width: 210mm; height: 297mm;
    position: relative; overflow: hidden;
    page-break-after: always;
  }
  .page--cream { background: var(--cream); }
  .page:last-child { page-break-after: auto; }

  .frame {
    position: absolute; inset: 11mm;
    border: 1.2px solid rgba(201,161,74,0.32); border-radius: 3mm; pointer-events: none;
  }
  .frame::after {
    content: ""; position: absolute; inset: 2.6mm;
    border: 0.8px solid rgba(201,161,74,0.12); border-radius: 2mm;
  }

  .eyebrow {
    display: flex; align-items: center; gap: 6mm;
    font-size: 9pt; font-weight: 700; letter-spacing: .38em; text-transform: uppercase;
    color: var(--gold-deep); white-space: nowrap;
  }
  .page--dark .eyebrow { color: var(--gold-soft); }
  .eyebrow span { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(201,161,74,.45)); }
  .eyebrow span:last-child { background: linear-gradient(to left, transparent, rgba(201,161,74,.45)); }

  .folio {
    position: absolute; bottom: 14mm; left: 24mm; right: 24mm;
    text-align: center;
    font-size: 8.5pt; font-weight: 600; letter-spacing: .18em; text-transform: uppercase;
    color: var(--muted);
  }
  .folio::before {
    content: ""; display: block; width: 40mm; height: 1px;
    background: var(--gold); margin: 0 auto 3mm;
  }
  .folio b { font-weight: 700; color: var(--gold-deep); letter-spacing: .1em; }

  .content { padding: 18mm 24mm 24mm; height: 100%; display: flex; flex-direction: column; }
  .content-head { margin-bottom: 5mm; }
  .content-head h2 { font-family: var(--serif); font-weight: 450; font-size: 24pt; line-height: 1.1; }
  .content-head h2 em { font-style: italic; color: var(--gold-deep); }
  .content-head p { margin-top: 2mm; font-size: 10pt; line-height: 1.55; color: var(--muted); max-width: 130mm; }

  .world { flex: 1; display: flex; flex-direction: column; }
  .world__top { display: flex; justify-content: space-between; align-items: baseline; gap: 4mm; }
  .world__tag { font-size: 8pt; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: var(--gold-deep); }
  .world__name { font-family: var(--serif); font-size: 22pt; font-weight: 500; color: var(--ink); margin-top: 1mm; }
  .world__score {
    flex-shrink: 0; font-size: 10pt; font-weight: 700; letter-spacing: .08em;
    background: rgba(201,161,74,.12); color: var(--ink); padding: 2.2mm 4.5mm; border-radius: 2mm;
  }
  .world__bar { margin-top: 4mm; height: 4mm; background: rgba(11,31,26,.1); border-radius: 2mm; overflow: hidden; }
  .world__bar-fill { height: 100%; border-radius: 2mm; }
  .world__bar-fill.is-green { background: var(--green-bar); }
  .world__bar-fill.is-red { background: var(--red-bar); }
  .world__bar-fill.is-gold { background: var(--gold); }

  .inputs { margin-top: 5mm; display: grid; grid-template-columns: 1fr 1fr; gap: 0 8mm; }
  .input-row { display: flex; justify-content: space-between; align-items: baseline; gap: 3mm; padding: 2.6mm 0; border-bottom: 1px dashed rgba(11,31,26,.12); }
  .input-row span { font-size: 9pt; color: var(--muted); line-height: 1.4; }
  .input-row b { font-size: 9.5pt; color: var(--ink); font-weight: 700; white-space: nowrap; }

  .commentary { margin-top: 5mm; }
  .commentary + .commentary { margin-top: 4mm; }
  .commentary__phase { font-size: 7.5pt; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--gold-deep); margin-bottom: 1mm; }
  .commentary__headline { font-family: var(--serif); font-size: 14pt; font-weight: 500; color: var(--ink); line-height: 1.25; }
  .commentary__coach { margin-top: 2mm; font-size: 9.5pt; line-height: 1.65; color: var(--muted); text-align: justify; }
  .commentary__say { margin-top: 2.5mm; font-family: var(--serif); font-style: italic; font-size: 11pt; color: var(--gold-deep); }

  .tipbox {
    margin-top: auto; margin-bottom: 8mm; background: var(--ink); color: var(--cream); border-radius: 3mm;
    padding: 5mm 6mm;
  }
  .tipbox__label { font-size: 7.5pt; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: var(--gold-soft); margin-bottom: 1.5mm; }
  .tipbox p { font-size: 9pt; line-height: 1.6; color: rgba(246,241,231,.92); }

  @media print {
    body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function toneClass(tone) {
  return tone === "green" ? "is-green" : tone === "red" ? "is-red" : "is-gold";
}

function getReport() {
  try {
    var hash = window.location.hash.replace(/^#/, "");
    if (!hash) return null;
    var json = decodeURIComponent(atob(hash));
    return JSON.parse(json);
  } catch (e) {
    console.error("Failed to load report:", e);
    return null;
  }
}

function renderWorldPage(report, wld, pageNum, total) {
  var primary = wld.sections[0].st;
  var pct = clamp(Math.round((primary.power && primary.power.pct) || primary.score || 0), 0, 100);
  var tone = primary.power ? primary.power.tone : "gold";
  var statText = esc(primary.stat || (primary.score + "%"));

  var html = '<div class="page page--cream">'
    + '<div class="frame"></div>'
    + '<div class="content">'
    + '<div class="content-head">'
    + '<div class="world__top" style="margin-bottom:2mm;">'
    + '<div><div class="eyebrow"><span></span>' + esc(wld.tag) + '<span></span></div>'
    + '<h2>' + esc(wld.name) + '</h2></div>'
    + '<span class="world__score">' + statText + '</span></div>'
    + '</div>'
    + '<div class="world">'
    + '<div class="world__bar"><div class="world__bar-fill ' + toneClass(tone) + '" style="width:' + pct + '%"></div></div>';

  if (wld.inputs && wld.inputs.length) {
    html += '<div class="inputs">';
    wld.inputs.forEach(function(r) {
      html += '<div class="input-row"><span>' + esc(r.label) + '</span><b>' + esc(r.value) + '</b></div>';
    });
    html += '</div>';
  }

  wld.sections.forEach(function(sec) {
    html += '<div class="commentary">';
    if (sec.phaseTitle) html += '<p class="commentary__phase">' + esc(sec.phaseTitle) + '</p>';
    html += '<p class="commentary__headline">' + esc(sec.st.headline || "") + '</p>'
      + '<p class="commentary__coach">' + esc(sec.st.coach || "") + '</p>'
      + '<p class="commentary__say">“' + esc(sec.st.say || "") + '”</p>';
    html += '</div>';
  });

  html += '<div class="tipbox">'
    + '<p class="tipbox__label">Next Step</p>'
    + '<p>Bring this roadmap to your session with Sofina and turn these numbers into a clear, personalised action plan.</p>'
    + '</div>';

  html += '</div></div>'
    + '<div class="folio"><b>Capy\'s Quest</b> · Your Money Journey Roadmap · ' + pageNum + ' / ' + total + '</div>'
    + '</div>';
  return html;
}

function render() {
  var report = getReport();
  var app = document.getElementById("app");
  if (!report) {
    app.innerHTML = '<div class="page page--cream"><div class="content"><p>No report data found.</p></div></div>';
    return;
  }

  var totalPages = report.worlds.length;
  var html = '';
  report.worlds.forEach(function(wld, i) {
    html += renderWorldPage(report, wld, i + 1, totalPages);
  });
  app.innerHTML = html;
}

render();

function loadScript(src) {
  return new Promise(function(resolve, reject) {
    var s = document.createElement("script");
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

function downloadAsPdf() {
  var pages = Array.prototype.slice.call(document.querySelectorAll(".page"));
  if (!pages.length) return;

  Promise.all([
    loadScript("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"),
    loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js")
  ]).then(function() {
    return document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
  }).then(function() {
    return Promise.all(pages.map(function(page) {
      return window.html2canvas(page, {
        backgroundColor: null,
        scale: 2,
        useCORS: true,
        logging: false
      });
    }));
  }).then(function(canvases) {
    var JsPDF = window.jspdf.jsPDF;
    var doc = new JsPDF({ unit: "mm", format: "a4", compress: true });
    var pw = doc.internal.pageSize.getWidth();
    var ph = doc.internal.pageSize.getHeight();

    canvases.forEach(function(canvas, i) {
      if (i > 0) doc.addPage();
      var img = canvas.toDataURL("image/jpeg", 0.92);
      doc.addImage(img, "JPEG", 0, 0, pw, ph);
    });

    var blob = doc.output("blob");
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "capy-roadmap-sofina.pdf";
    a.style.display = "none";
    document.body.appendChild(a);
    a.click();
    setTimeout(function() {
      URL.revokeObjectURL(a.href);
      document.body.removeChild(a);
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: "capy-pdf-download", ok: true }, "*");
      }
    }, 1000);
  }).catch(function(err) {
    console.error("PDF generation failed:", err);
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: "capy-pdf-download", ok: false, error: String(err) }, "*");
    }
  });
}

if (window.location.search.indexOf("download=1") !== -1) {
  window.addEventListener("load", function() {
    setTimeout(downloadAsPdf, 600);
  });
} else if (window.location.search.indexOf("print=1") !== -1) {
  window.addEventListener("load", function() {
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(function() { setTimeout(function() { window.print(); }, 300); });
    } else {
      setTimeout(function() { window.print(); }, 800);
    }
  });
}
</script>
</body>
</html>
