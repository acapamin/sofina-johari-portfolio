[build]
  command = "echo 'Static site - no build needed'"
  publish = "."

[functions]
  directory = "netlify/functions"

# Function route must precede the SPA catch-all
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/send-roadmap"
  to = "/.netlify/functions/send-roadmap"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
